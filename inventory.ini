# Benchmark topology (split):
#   bench-vm  — PostgreSQL + host metrics (PCP); owns the database.
#   client-vm — HammerDB (Podman) generates load against bench-vm over the network.
#
# Shared SSH/runtime vars are under [remote:vars]. PostgreSQL tuning under [bench:vars].
[all:vars]
# Used by the localhost metadata play; leave empty to default to <project>/results.
perf_results_path=
perf_run_stamp=

[remote:children]
bench
client

[remote:vars]
ansible_python_interpreter=auto_silent

ansible_become_timeout=7200
ansible_ssh_common_args=-o ServerAliveInterval=30 -o ServerAliveCountMax=240 -o TCPKeepAlive=yes -o ConnectTimeout=60

hammerdb_container_image=docker.io/tpcorg/hammerdb:v4.12
hammerdb_remote_workdir=/root/hammerdb-run
hammerdb_benchmark=TPC-C
# hammerdb_virtual_users=56
hammerdb_warehouses=2000
hammerdb_rampup=2
hammerdb_duration=5

pcp_sample_interval_sec=4

[bench]
bench-vm ansible_user=root

[client]
client-vm ansible_user=root

[bench:vars]
postgresql_pgdg_el_major=9
postgresql_server_pkg=postgresql17-server
postgresql_server_pkg_version=
postgresql_service_name=postgresql-17
pgsql_bin_dir=/usr/pgsql-17/bin
pgsql_data_dir=/var/lib/pgsql/17/data
pgsql_port=5432
pgsql_listen_addresses=*
pgsql_admin_connect_host=127.0.0.1
pgsql_benchmark_client_hba_network=0.0.0.0/0

pgsql_superuser=postgres
pgsql_superuser_password=postgres

pgsql_benchmark_user=benchuser
pgsql_benchmark_password=benchmark
pgsql_benchmark_db=benchdb

pgsql_benchmark_low_variance_tune=true
pgsql_tune_work_mem=128MB
pgsql_tune_maintenance_work_mem=1GB
pgsql_tune_bgwriter_lru_maxpages=0
pgsql_tune_bgwriter_flush_after=0
pgsql_tune_fsync=off
pgsql_tune_synchronous_commit=off
pgsql_tune_checkpoint_timeout=60min
pgsql_tune_checkpoint_completion_target=0.9
pgsql_tune_max_wal_size=250GB
pgsql_tune_min_wal_size=1GB
pgsql_tune_random_page_cost=1.1
pgsql_tune_cpu_tuple_cost=0.03
pgsql_tune_effective_cache_size=64GB
pgsql_tune_log_min_duration_statement=10
pgsql_tune_autovacuum=off
pgsql_tune_autovacuum_max_workers=10
pgsql_tune_autovacuum_vacuum_cost_limit=3000
pgsql_tune_lc_messages=C
pgsql_tune_log_checkpoints=on
