# Benchmark topology (split):
#   bench-vm  — PostgreSQL + host metrics (PCP); owns the database.
#   client-vm — HammerDB (Podman) generates load against bench-vm over the network.
#
# Shared SSH/runtime vars are under [remote:vars]. PostgreSQL tuning under [bench:vars].
[all:vars]
# Used by the localhost metadata play; leave empty to default to <project>/results.
perf_results_path=
perf_run_stamp=

[remote:children]
bench
client

[remote:vars]
ansible_python_interpreter=auto_silent

ansible_become_timeout=7200
ansible_ssh_common_args=-o ServerAliveInterval=30 -o ServerAliveCountMax=240 -o TCPKeepAlive=yes -o ConnectTimeout=60

# OS prep (playbooks/os-setup.yaml) — shared defaults; per-group release URLs below.
os_prep_enable=true
os_prep_rhel_arch=x86_64
os_prep_reboot_timeout=1800
# Set true if the RHEL tree provides CRB and you need those packages during distro-sync.
os_prep_include_crb=false
# Remove PostgreSQL/PGDG/PCP from a prior setup.yaml before downgrading/pinning RHEL (re-run setup after).
os_prep_remove_provisioned_packages=true

hammerdb_container_image=docker.io/tpcorg/hammerdb:v4.12
hammerdb_remote_workdir=/root/hammerdb-run
hammerdb_benchmark=TPC-C
hammerdb_virtual_users=56
hammerdb_warehouses=2000
hammerdb_rampup=2
hammerdb_duration=15

pcp_sample_interval_sec=4
pcp_capture_enable=true
pcp_setup_smoke_test=true

[bench]
bench-vm ansible_user=root

[client]
client-vm ansible_user=root

[bench:vars]
# RHEL baseline for SUT (bench) — change only these when comparing newer RHEL on the database host.
# Pin a dated compose for reproducible CPT (latest-* moves over time), e.g.:
#   .../RHEL-9.0.0-20230112.0  or  .../RHEL-9.7.0-RC-1.3
os_prep_rhel_release_root=https://download.eng.pnq.redhat.com/rhel-9/rel-eng/RHEL-9/latest-RHEL-9.0.0
os_prep_rhel_release_id=9.0
# PGDG packages require newer openldap/openssl than RHEL 9.0 ships.
# Point this at a 9.8+ compose BaseOS to pull just the library deps:
pgdg_deps_baseurl=https://download.eng.pnq.redhat.com/rhel-9/rel-eng/RHEL-9/latest-RHEL-9.8.0/compose/BaseOS/x86_64/os/

# NVMe data volume (see lsblk on bench host). Set bench_storage_mkfs=true on first run if the disk is blank.
bench_storage_enable=true
bench_storage_mkfs=false
bench_data_disk=/dev/nvme0n1
bench_data_mount=/pgsql
bench_data_fstype=xfs
bench_data_mount_opts=defaults,noatime,nodiratime
# PGDATA is {{ bench_data_mount }}/data when bench_storage_enable=true (see group_vars/bench.yml).

# Block devices for per-disk PCP metrics during benchmarks (must match lsblk names).
pcp_disk_dev_instances=nvme0n1,sdb,sdc,sda

bench_sysctl_tuning=true
bench_disable_thp=true
# Open tcp/5432 on bench via iptables -I INPUT (set false to manage firewall outside Ansible).
bench_manage_firewall=true

# PostgreSQL major from PGDG (https://www.postgresql.org/download/linux/redhat/).
postgresql_major=17
pgsql_max_connections=2000
pgsql_port=5432
pgsql_listen_addresses=*
pgsql_admin_connect_host=127.0.0.1
pgsql_benchmark_client_hba_network=0.0.0.0/0

pgsql_superuser=postgres
pgsql_superuser_password=postgres

pgsql_benchmark_user=benchuser
pgsql_benchmark_password=benchmark
pgsql_benchmark_db=benchdb

pgsql_benchmark_low_variance_tune=true
# false = keep OS page cache / shared_buffers warm before timed HammerDB run
bench_drop_caches_before_test=false
# true = pg_prewarm after schema build (needs postgresql-contrib on bench)
pgsql_warm_database_before_run=true
# Memory: leave empty to auto-size from ansible_memtotal_mb on bench (see playbooks/tasks/pgsql-benchmark-tuning.yaml).
pgsql_tune_os_reserve_mb=8192
pgsql_tune_shared_buffers_ram_pct=75
pgsql_tune_shared_buffers_mb_min=1024
pgsql_tune_shared_buffers=270GB
pgsql_tune_effective_cache_ram_pct=85
pgsql_tune_effective_cache_size=310GB
pgsql_tune_work_mem=128MB
pgsql_tune_maintenance_work_mem=1GB
pgsql_tune_bgwriter_lru_maxpages=0
pgsql_tune_bgwriter_flush_after=0
pgsql_tune_fsync=off
pgsql_tune_synchronous_commit=off
# Max checkpoint_timeout (86400s = 24h) + very large WAL so timed HammerDB run stays between checkpoints.
pgsql_tune_checkpoint_timeout=86400
pgsql_tune_checkpoint_completion_target=0.9
pgsql_tune_max_wal_size=500GB
pgsql_tune_min_wal_size=4GB
pgsql_tune_random_page_cost=1.1
pgsql_tune_cpu_tuple_cost=0.03
pgsql_tune_log_min_duration_statement=10
pgsql_tune_autovacuum=off
pgsql_tune_autovacuum_max_workers=10
pgsql_tune_autovacuum_vacuum_cost_limit=3000
pgsql_tune_lc_messages=C
pgsql_tune_log_checkpoints=on

[client:vars]
# RHEL build for client (HammerDB load generator). Can differ from bench.
os_prep_rhel_release_root=https://download.eng.pnq.redhat.com/rhel-9/rel-eng/RHEL-9/latest-RHEL-9.4.0
os_prep_rhel_release_id=9.4

# Load generator is usually lighter on storage; adjust to match client lsblk if needed.
pcp_disk_dev_instances=sda
