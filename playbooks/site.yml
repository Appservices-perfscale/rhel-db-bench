---
# Full benchmark pipeline: run HammerDB test, generate results.json + monitoring.json,
# fetch all artifacts from remote hosts, and combine into a master JSON file.
#
#   ansible-playbook playbooks/site.yml
#   ansible-playbook playbooks/site.yml -e hammerdb_virtual_users=56
#
# Requires playbooks/setup.yaml to have been run once before the first benchmark.
# Produces in results/:
#   <run_id>-benchmark-report.json   — full report with PCP samples
#   <run_id>-results.json            — HammerDB KPIs only
#   <run_id>-monitoring.json         — aggregate PCP statistics (mean/max/p95)
#   <run_id>-bench-metrics-samples.log  — raw PCP data (bench)
#   <run_id>-client-metrics-samples.log — raw PCP data (client)
#   <run_id>-master.json             — combined master with facts + results + monitoring
#                                    (includes OPL status-data fields: name, result)
#
# When pass_or_fail_cfg.yaml exists at the project root (copy from .example):
#   pass_or_fail runs against PostgreSQL history, sets result on master.json.
#   Use -e cpt_establish_baseline=true to seed a baseline (see docs/cpt-developer.md).
# When archive_cfg.yaml exists (copy from .example):
#   master.json is uploaded to db_cpt_rhel_data (id, datetime, data JSONB).
# Run artifacts (logs + JSON) are copied to file storage when a root is configured via
#   CPT_ARTIFACT_ROOT (Jenkins: e.g. /workspace/ARTIFACTS/DB-CPT-RHEL) or
#   artifact_storage.root in archive_cfg.yaml (CPT_ARTIFACT_ROOT wins when set).
# Requires: pip install opl pass_or_fail.py, psycopg2-binary, jq.
# PostgreSQL password: archive_cfg.yaml postgresql.password (gitignored) or export PGPASSWORD.

# ── Phase 1: Run the benchmark (HammerDB + PCP collection + report) ──
- import_playbook: test.yaml

# ── Phase 2: Fetch facts.json and assemble master JSON ──
- name: Fetch facts and assemble master JSON on controller
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    _bench: "{{ groups['bench'][0] }}"
    _client: "{{ groups['client'][0] }}"
    results_dir: "{{ hostvars['localhost']['_test_results_dir'] | default(playbook_dir ~ '/../results') }}"
    run_id: "{{ hostvars['localhost']['_test_benchmark_run_id'] | default('unknown') }}"
    results_json: "{{ hostvars['localhost']['_test_results_json_path'] | default(results_dir ~ '/' ~ run_id ~ '-results.json') }}"
    monitoring_json: "{{ hostvars['localhost']['_test_monitoring_json_path'] | default(results_dir ~ '/' ~ run_id ~ '-monitoring.json') }}"
    bench_metrics_log: "{{ hostvars['localhost']['_test_bench_metrics_log'] | default('') }}"
    client_metrics_log: "{{ hostvars['localhost']['_test_client_metrics_log'] | default('') }}"
    master_json_path: "{{ results_dir }}/{{ run_id }}-master.json"
    status_data_name: DB-CPT-RHEL
    pass_or_fail_cfg_path: "{{ playbook_dir }}/../pass_or_fail_cfg.yaml"
    archive_cfg_path: "{{ playbook_dir }}/../archive_cfg.yaml"
    # Developer CPT profile (optional extra vars; see docs/cpt-developer.md):
    #   -e cpt_establish_baseline=true   — seed baseline, skip regression check, result=PASS
    #   -e cpt_hardware_profile=r650     — tag runs (r640, r650, …) for pass_or_fail history matching
    #   -e cpt_profile_label=staging     — optional free-form cohort label
    cpt_establish_baseline: false
    cpt_hardware_profile: ""
    cpt_profile_label: ""
    benchmark_report_path: "{{ hostvars['localhost']['_test_benchmark_report_path'] | default(results_dir ~ '/' ~ run_id ~ '-benchmark-report.json') }}"
    facts_dir: >-
      {{ ((perf_results_path | default('') | string | trim | length > 0)
      | ternary(perf_results_path | string | trim, playbook_dir ~ '/../results'))
      ~ '/os-prep' }}
  tasks:
    - name: Locate facts.json files from os-prep
      ansible.builtin.find:
        paths: "{{ facts_dir }}"
        patterns: "facts.json"
        recurse: true
      register: facts_files

    - name: Write merged facts.json to staging file
      ansible.builtin.shell: |
        set -euo pipefail
        FACTS_DIR="{{ facts_dir }}"
        STAGING="{{ results_dir }}/.{{ run_id }}-facts-merged.json"
        if [ -d "$FACTS_DIR" ] && ls "$FACTS_DIR"/*/facts.json 1>/dev/null 2>&1; then
          python3 - "$FACTS_DIR" "$STAGING" <<'PYEOF'
        import json, sys, pathlib
        d, out = pathlib.Path(sys.argv[1]), pathlib.Path(sys.argv[2])
        facts = {}
        for p in sorted(d.rglob("facts.json")):
            facts[p.parent.name] = json.loads(p.read_text())
        out.write_text(json.dumps(facts, indent=2))
        PYEOF
        else
          echo '{}' > "$STAGING"
        fi
      args:
        executable: /bin/bash
      changed_when: true

    - name: Generate unique run ID and timestamps
      ansible.builtin.shell: |
        set -euo pipefail
        RUN_ID="run-$(date --utc -Ins | sed 's/[^0-9A-Za-z-]\+/_/g')"
        START_EPOCH="{{ hostvars[_bench].get('test_start_epoch', '') }}"
        END_EPOCH="{{ hostvars[_client].get('test_end_epoch', '') }}"
        if [ -n "$START_EPOCH" ]; then
          STARTED=$(date -u -d "@${START_EPOCH}" --iso-8601=seconds 2>/dev/null || \
            python3 -c "from datetime import datetime,timezone; print(datetime.fromtimestamp(int('${START_EPOCH}'),tz=timezone.utc).isoformat())")
        else
          STARTED=""
        fi
        if [ -n "$END_EPOCH" ]; then
          ENDED=$(date -u -d "@${END_EPOCH}" --iso-8601=seconds 2>/dev/null || \
            python3 -c "from datetime import datetime,timezone; print(datetime.fromtimestamp(int('${END_EPOCH}'),tz=timezone.utc).isoformat())")
        else
          ENDED=""
        fi
        printf '%s\n%s\n%s\n' "$RUN_ID" "$STARTED" "$ENDED"
      args:
        executable: /bin/bash
      register: run_meta
      changed_when: false

    - name: Assemble master JSON with jq
      vars:
        _meta_lines: "{{ run_meta.stdout_lines | default(['', '', '']) }}"
        _unique_id: "{{ _meta_lines[0] | default('') }}"
        _started: "{{ _meta_lines[1] | default('') }}"
        _ended: "{{ _meta_lines[2] | default('') }}"
        _facts_staging: "{{ results_dir }}/.{{ run_id }}-facts-merged.json"
      ansible.builtin.shell: |
        set -euo pipefail
        RESULTS_JSON="{{ results_json }}"
        MONITORING_JSON="{{ monitoring_json }}"
        FACTS_FILE="{{ _facts_staging }}"
        MASTER="{{ master_json_path }}"

        [ ! -f "$FACTS_FILE" ] && echo '{}' > "$FACTS_FILE"
        [ ! -f "$RESULTS_JSON" ] && RESULTS_JSON=/dev/null
        [ ! -f "$MONITORING_JSON" ] && MONITORING_JSON=/dev/null

        jq -n \
          --arg id "{{ _unique_id }}" \
          --arg name "{{ status_data_name }}" \
          --arg started "{{ _started }}" \
          --arg ended "{{ _ended }}" \
          --arg hw "{{ cpt_hardware_profile | default('') | trim }}" \
          --arg label "{{ cpt_profile_label | default('') | trim }}" \
          --argjson establish_baseline {{ 'true' if (cpt_establish_baseline | default(false) | bool) else 'false' }} \
          --slurpfile facts "$FACTS_FILE" \
          --slurpfile results "$RESULTS_JSON" \
          --slurpfile monitoring "$MONITORING_JSON" \
          '{
            id: $id,
            name: $name,
            started: $started,
            ended: $ended,
            result: null,
            cpt_profile: ({
              hardware: $hw,
              label: $label,
              establish_baseline_run: $establish_baseline
            } | with_entries(select(
              .key == "establish_baseline_run"
              or (.value | type) == "string" and (.value | length) > 0
            ))),
            facts: ($facts[0] // {}),
            results: ($results[0] // {}),
            monitoring: ($monitoring[0] // {})
          }' > "$MASTER"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Clean up staging files
      ansible.builtin.file:
        path: "{{ results_dir }}/.{{ run_id }}-facts-merged.json"
        state: absent

    - name: Check for archive config
      ansible.builtin.stat:
        path: "{{ archive_cfg_path }}"
      register: archive_cfg_stat

    - name: Load archive config
      ansible.builtin.include_vars:
        file: "{{ archive_cfg_path }}"
        name: archive_cfg
      when: archive_cfg_stat.stat.exists

    - name: Resolve PostgreSQL password for upload and pass_or_fail
      ansible.builtin.set_fact:
        _pg_password: >-
          {{
            (
              lookup(
                'env',
                (
                  archive_cfg.postgresql.password_env_var | default('PGPASSWORD')
                  if archive_cfg_stat.stat.exists
                  else 'PGPASSWORD'
                )
              ) | default('', true) | trim
            )
            if (
              lookup(
                'env',
                (
                  archive_cfg.postgresql.password_env_var | default('PGPASSWORD')
                  if archive_cfg_stat.stat.exists
                  else 'PGPASSWORD'
                )
              ) | default('', true) | trim | length > 0
            )
            else (
              archive_cfg.postgresql.password | default('') | string | trim
              if archive_cfg_stat.stat.exists
              else ''
            )
          }}
      no_log: true

    - name: Check for pass_or_fail config
      ansible.builtin.stat:
        path: "{{ pass_or_fail_cfg_path }}"
      register: pass_or_fail_cfg_stat

    - name: Load pass_or_fail config
      ansible.builtin.include_vars:
        file: "{{ pass_or_fail_cfg_path }}"
        name: pof_cfg
      when: pass_or_fail_cfg_stat.stat.exists

    - name: Mark established baseline on master JSON
      ansible.builtin.shell: |
        set -euo pipefail
        MASTER="{{ master_json_path }}"
        tmp="$(mktemp)"
        jq '.result = "PASS" | .cpt_profile.baseline = true' "$MASTER" > "$tmp"
        mv "$tmp" "$MASTER"
      args:
        executable: /bin/bash
      changed_when: true
      when: cpt_establish_baseline | default(false) | bool

    - name: Run pass_or_fail regression check
      ansible.builtin.command:
        argv:
          - pass_or_fail.py
          - --config
          - "{{ pass_or_fail_cfg_path }}"
          - --current-file
          - "{{ master_json_path }}"
      environment:
        PGPASSWORD: "{{ _pg_password }}"
      register: pass_or_fail_run
      failed_when: false
      changed_when: false
      no_log: true
      when:
        - pass_or_fail_cfg_stat.stat.exists
        - not (cpt_establish_baseline | default(false) | bool)

    - name: Read result field from master JSON
      ansible.builtin.command:
        argv:
          - jq
          - -r
          - ".result // \"null\""
          - "{{ master_json_path }}"
      register: master_result_field
      changed_when: false
      when:
        - pass_or_fail_cfg_stat.stat.exists or (cpt_establish_baseline | default(false) | bool)

    - name: Report pass_or_fail outcome
      ansible.builtin.debug:
        msg: >-
          {% if cpt_establish_baseline | default(false) | bool %}
          Baseline established: master.result={{ master_result_field.stdout | default('PASS') | trim }}
          (regression check skipped; upload this run to seed history for the CPT profile).
          {% else %}
          pass_or_fail rc={{ pass_or_fail_run.rc | default('skipped') }},
          master.result={{ master_result_field.stdout | trim }}.
          {% if (master_result_field.stdout | trim) == 'null' %}
          No comparison — empty history for this profile. Re-run with -e cpt_establish_baseline=true
          (and matching -e cpt_hardware_profile / VU / label settings) to seed a baseline first.
          {% endif %}
          {% endif %}
      when:
        - pass_or_fail_cfg_stat.stat.exists or (cpt_establish_baseline | default(false) | bool)

    - name: Resolve artifact storage root
      ansible.builtin.set_fact:
        _cpt_artifact_root: "{{ _resolved_root | trim }}"
        _artifact_archive_enabled: "{{ _archive_enabled | bool }}"
      vars:
        _env_root: "{{ lookup('env', 'CPT_ARTIFACT_ROOT') | default('', true) | trim }}"
        _cfg_root: >-
          {{
            archive_cfg.artifact_storage.root | default('') | string | trim
            if (archive_cfg_stat.stat.exists and archive_cfg.artifact_storage is defined)
            else ''
          }}
        _resolved_root: "{{ _env_root if (_env_root | length > 0) else _cfg_root }}"
        _archive_enabled: >-
          {{
            (archive_cfg.artifact_storage.enabled | default(true))
            if (archive_cfg_stat.stat.exists and archive_cfg.artifact_storage is defined)
            else true
          }}

    - name: Archive run artifacts to file storage
      ansible.builtin.shell: |
        set -euo pipefail
        ARCHIVE="{{ _cpt_artifact_root }}/{{ run_id }}"
        mkdir -p "$ARCHIVE"
        for f in \
          "{{ master_json_path }}" \
          "{{ results_json }}" \
          "{{ monitoring_json }}" \
          "{{ benchmark_report_path }}" \
          "{{ bench_metrics_log }}" \
          "{{ client_metrics_log }}"; do
          if [ -n "$f" ] && [ -f "$f" ]; then
            cp -a "$f" "$ARCHIVE/"
          fi
        done
        echo "$ARCHIVE"
      args:
        executable: /bin/bash
      register: artifact_archive_run
      changed_when: true
      when:
        - _cpt_artifact_root | length > 0
        - _artifact_archive_enabled | bool

    - name: Warn when PostgreSQL upload skipped (no password configured)
      ansible.builtin.debug:
        msg: >-
          Skipping DB upload: set postgresql.password in archive_cfg.yaml or export
          {{ archive_cfg.postgresql.password_env_var | default('PGPASSWORD') }}='...'.
      when:
        - archive_cfg_stat.stat.exists
        - _pg_password | default('') | length == 0

    - name: Upload master JSON to PostgreSQL data table
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../scripts/upload_db_cpt_result.py"
          - "{{ master_json_path }}"
          - --host
          - "{{ archive_cfg.postgresql.host }}"
          - --port
          - "{{ archive_cfg.postgresql.port | default(5432) }}"
          - --database
          - "{{ archive_cfg.postgresql.database }}"
          - --user
          - "{{ archive_cfg.postgresql.user }}"
          - --table
          - "{{ archive_cfg.postgresql.table | default('db_cpt_rhel_data') }}"
          - --password-env
          - "{{ archive_cfg.postgresql.password_env_var | default('PGPASSWORD') }}"
      environment:
        PGPASSWORD: "{{ _pg_password }}"
      register: db_upload_run
      changed_when: db_upload_run.rc == 0
      no_log: true
      when:
        - archive_cfg_stat.stat.exists
        - _pg_password | default('') | length > 0

    - name: Show master JSON path
      ansible.builtin.debug:
        msg: "Master JSON written to {{ master_json_path }}"

    - name: List all generated artifacts
      ansible.builtin.debug:
        msg: |
          Artifacts for run {{ run_id }}:
            master:       {{ master_json_path }}
            pass/fail:    {{ (master_result_field.stdout | default('n/a') | trim) if pass_or_fail_cfg_stat.stat.exists else 'skipped (no pass_or_fail_cfg.yaml)' }}
            archive:      {{ artifact_archive_run.stdout | default('skipped (set CPT_ARTIFACT_ROOT or archive_cfg artifact_storage.root)') | trim }}
            db upload:    {{ 'ok' if (db_upload_run is defined and db_upload_run.rc | default(1) == 0) else 'skipped' }}
            results:      {{ results_json }}
            monitoring:   {{ monitoring_json }}
            bench PCP:    {{ bench_metrics_log }}
            client PCP:   {{ client_metrics_log }}
            full report:  {{ hostvars['localhost']['_test_benchmark_report_path'] | default('') }}
