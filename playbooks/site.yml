---
# Full benchmark pipeline: run HammerDB test, generate results.json + monitoring.json,
# fetch all artifacts from remote hosts, and combine into a master JSON file.
#
#   ansible-playbook playbooks/site.yml
#   ansible-playbook playbooks/site.yml -e hammerdb_virtual_users=56
#
# Requires playbooks/setup.yaml to have been run once before the first benchmark.
# Produces in results/:
#   <run_id>-benchmark-report.json   — full report with PCP samples
#   <run_id>-results.json            — HammerDB KPIs only
#   <run_id>-monitoring.json         — aggregate PCP statistics (mean/max/p95)
#   <run_id>-bench-metrics-samples.log  — raw PCP data (bench)
#   <run_id>-client-metrics-samples.log — raw PCP data (client)
#   <run_id>-master.json             — combined master with facts + results + monitoring

# ── Phase 1: Run the benchmark (HammerDB + PCP collection + report) ──
- import_playbook: test.yaml

# ── Phase 2: Fetch facts.json and assemble master JSON ──
- name: Fetch facts and assemble master JSON on controller
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    _bench: "{{ groups['bench'][0] }}"
    _client: "{{ groups['client'][0] }}"
    results_dir: "{{ hostvars['localhost']['_test_results_dir'] | default(playbook_dir ~ '/../results') }}"
    run_id: "{{ hostvars['localhost']['_test_benchmark_run_id'] | default('unknown') }}"
    results_json: "{{ hostvars['localhost']['_test_results_json_path'] | default(results_dir ~ '/' ~ run_id ~ '-results.json') }}"
    monitoring_json: "{{ hostvars['localhost']['_test_monitoring_json_path'] | default(results_dir ~ '/' ~ run_id ~ '-monitoring.json') }}"
    bench_metrics_log: "{{ hostvars['localhost']['_test_bench_metrics_log'] | default('') }}"
    client_metrics_log: "{{ hostvars['localhost']['_test_client_metrics_log'] | default('') }}"
    master_json_path: "{{ results_dir }}/{{ run_id }}-master.json"
    facts_dir: "{{ results_dir }}/os-prep"
  tasks:
    - name: Locate facts.json files from os-prep
      ansible.builtin.find:
        paths: "{{ facts_dir }}"
        patterns: "facts.json"
        recurse: true
      register: facts_files

    - name: Write merged facts.json to staging file
      ansible.builtin.shell: |
        set -euo pipefail
        FACTS_DIR="{{ facts_dir }}"
        STAGING="{{ results_dir }}/.{{ run_id }}-facts-merged.json"
        if [ -d "$FACTS_DIR" ] && ls "$FACTS_DIR"/*/facts.json 1>/dev/null 2>&1; then
          python3 - "$FACTS_DIR" "$STAGING" <<'PYEOF'
        import json, sys, pathlib
        d, out = pathlib.Path(sys.argv[1]), pathlib.Path(sys.argv[2])
        facts = {}
        for p in sorted(d.rglob("facts.json")):
            facts[p.parent.name] = json.loads(p.read_text())
        out.write_text(json.dumps(facts, indent=2))
        PYEOF
        else
          echo '{}' > "$STAGING"
        fi
      args:
        executable: /bin/bash
      changed_when: true

    - name: Generate unique run ID and timestamps
      ansible.builtin.shell: |
        set -euo pipefail
        RUN_ID="run-$(date --utc -Ins | sed 's/[^0-9A-Za-z-]\+/_/g')"
        START_EPOCH="{{ hostvars[_bench].get('test_start_epoch', '') }}"
        END_EPOCH="{{ hostvars[_client].get('test_end_epoch', '') }}"
        if [ -n "$START_EPOCH" ]; then
          STARTED=$(date -u -d "@${START_EPOCH}" --iso-8601=seconds 2>/dev/null || \
            python3 -c "from datetime import datetime,timezone; print(datetime.fromtimestamp(int('${START_EPOCH}'),tz=timezone.utc).isoformat())")
        else
          STARTED=""
        fi
        if [ -n "$END_EPOCH" ]; then
          ENDED=$(date -u -d "@${END_EPOCH}" --iso-8601=seconds 2>/dev/null || \
            python3 -c "from datetime import datetime,timezone; print(datetime.fromtimestamp(int('${END_EPOCH}'),tz=timezone.utc).isoformat())")
        else
          ENDED=""
        fi
        printf '%s\n%s\n%s\n' "$RUN_ID" "$STARTED" "$ENDED"
      args:
        executable: /bin/bash
      register: run_meta
      changed_when: false

    - name: Assemble master JSON with jq
      vars:
        _meta_lines: "{{ run_meta.stdout_lines | default(['', '', '']) }}"
        _unique_id: "{{ _meta_lines[0] | default('') }}"
        _started: "{{ _meta_lines[1] | default('') }}"
        _ended: "{{ _meta_lines[2] | default('') }}"
        _facts_staging: "{{ results_dir }}/.{{ run_id }}-facts-merged.json"
      ansible.builtin.shell: |
        set -euo pipefail
        RESULTS_JSON="{{ results_json }}"
        MONITORING_JSON="{{ monitoring_json }}"
        FACTS_FILE="{{ _facts_staging }}"
        MASTER="{{ master_json_path }}"

        [ ! -f "$FACTS_FILE" ] && echo '{}' > "$FACTS_FILE"
        [ ! -f "$RESULTS_JSON" ] && RESULTS_JSON=/dev/null
        [ ! -f "$MONITORING_JSON" ] && MONITORING_JSON=/dev/null

        jq -n \
          --arg id "{{ _unique_id }}" \
          --arg started "{{ _started }}" \
          --arg ended "{{ _ended }}" \
          --slurpfile facts "$FACTS_FILE" \
          --slurpfile results "$RESULTS_JSON" \
          --slurpfile monitoring "$MONITORING_JSON" \
          '{
            id: $id,
            started: $started,
            ended: $ended,
            facts: ($facts[0] // {}),
            results: ($results[0] // {}),
            monitoring: ($monitoring[0] // {})
          }' > "$MASTER"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Clean up staging files
      ansible.builtin.file:
        path: "{{ results_dir }}/.{{ run_id }}-facts-merged.json"
        state: absent

    - name: Show master JSON path
      ansible.builtin.debug:
        msg: "Master JSON written to {{ master_json_path }}"

    - name: List all generated artifacts
      ansible.builtin.debug:
        msg: |
          Artifacts for run {{ run_id }}:
            master:       {{ master_json_path }}
            results:      {{ results_json }}
            monitoring:   {{ monitoring_json }}
            bench PCP:    {{ bench_metrics_log }}
            client PCP:   {{ client_metrics_log }}
            full report:  {{ hostvars['localhost']['_test_benchmark_report_path'] | default('') }}
