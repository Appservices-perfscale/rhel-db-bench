---
# One-time provisioning for bench (PostgreSQL SUT) and client (HammerDB load generator).
# Version, paths, and tuning knobs come from inventory.ini ([bench:vars], [remote:vars]).
#
# Lab hosts are reachable only over VPN from the machine running ansible-playbook.
# Connect VPN before running the full playbook (bench + client plays).
#
#   ansible-playbook playbooks/setup.yaml
#   ansible-playbook playbooks/setup.yaml -i inventory.ini -i inventory.local.ini --limit bench
#
- name: Provision database host (bench)
  hosts: bench
  gather_facts: true
  vars:
    bench_sysctl:
      vm.swappiness: "1"
      kernel.numa_balancing: "0"
    _pgsql_sysconfig: "/etc/sysconfig/postgresql-{{ postgresql_major }}"
    _pgsql_connect_host: "{{ pgsql_admin_connect_host | default('127.0.0.1') }}"
    _pgdg_el_major: "{{ postgresql_pgdg_el_major | default(ansible_facts['distribution_major_version']) | string }}"
    _pgdg_repo_arch: "{{ 'x86_64' if ansible_facts['architecture'] in ['x86_64', 'amd64'] else ansible_facts['architecture'] }}"
    _pgdg_repo_rpm: >-
      https://download.postgresql.org/pub/repos/yum/reporpms/EL-{{ _pgdg_el_major }}-{{ _pgdg_repo_arch }}/pgdg-redhat-repo-latest.noarch.rpm
    pcp_pmdumptext_smoke_metrics:
      - kernel.all.cpu.user
      - mem.util.used
      - disk.all.read
  tasks:
    # --- System preparation ---
    - name: Fix stale PGDG repo releasever from prior partial runs
      ansible.builtin.command: >-
        sed -i 's|/rhel-$releasever-|/rhel-{{ _pgdg_el_major }}-|g'
        /etc/yum.repos.d/pgdg-redhat-all.repo
      register: _pgdg_stale_fix
      changed_when: _pgdg_stale_fix.rc == 0
      failed_when: false

    - name: Install base packages for provisioning
      ansible.builtin.dnf:
        name:
          - python3
          - xfsprogs
          - rsync
          - policycoreutils-python-utils
        state: present

    # --- Storage ---
    - name: Detect filesystem on bench data disk
      ansible.builtin.command: blkid -o value -s TYPE {{ bench_data_disk }}
      register: bench_data_disk_fstype
      changed_when: false
      failed_when: false
      when: bench_storage_enable | default(true) | bool

    - name: Create XFS on bench data disk when empty
      ansible.builtin.command: mkfs.xfs -f {{ bench_data_disk }}
      when:
        - bench_storage_enable | default(true) | bool
        - bench_storage_mkfs | default(false) | bool
        - bench_data_disk_fstype.stdout | default('') | trim | length == 0

    - name: Fail when data disk has no filesystem and mkfs is disabled
      ansible.builtin.fail:
        msg: >-
          {{ bench_data_disk }} has no filesystem. Set bench_storage_mkfs=true in inventory
          to format it, or pre-create a filesystem and re-run setup.
      when:
        - bench_storage_enable | default(true) | bool
        - not (bench_storage_mkfs | default(false) | bool)
        - bench_data_disk_fstype.stdout | default('') | trim | length == 0

    - name: Mount bench PostgreSQL data volume
      ansible.builtin.mount:
        path: "{{ bench_data_mount }}"
        src: "{{ bench_data_disk }}"
        fstype: "{{ bench_data_fstype }}"
        opts: "{{ bench_data_mount_opts }}"
        state: mounted
      when: bench_storage_enable | default(true) | bool

    # --- Kernel tuning ---
    - name: Apply benchmark host sysctl tuning
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: "{{ ansible_loop.last | default(true) }}"
      loop: "{{ bench_sysctl | dict2items }}"
      loop_control:
        extended: true
        label: "{{ item.key }}"
      when: bench_sysctl_tuning | default(true) | bool

    - name: Install disable-thp systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/disable-thp.service
        mode: "0644"
        content: |
          [Unit]
          Description=Disable transparent huge pages
          DefaultDependencies=no
          After=sysinit.target local-fs.target
          Before={{ postgresql_service_name }}.service

          [Service]
          Type=oneshot
          ExecStart=/bin/sh -c 'echo never > /sys/kernel/mm/transparent_hugepage/enabled; echo never > /sys/kernel/mm/transparent_hugepage/defrag'

          [Install]
          WantedBy=multi-user.target
      when: bench_disable_thp | default(true) | bool
      register: bench_thp_unit

    - name: Enable disable-thp before PostgreSQL starts
      ansible.builtin.systemd:
        daemon_reload: "{{ bench_thp_unit.changed | default(false) }}"
        name: disable-thp.service
        enabled: true
        state: started
      when: bench_disable_thp | default(true) | bool

    # --- PostgreSQL via PGDG (https://www.postgresql.org/download/linux/redhat/) ---
    # PGDG packages are built against the latest RHEL x.y libraries.
    # On older minors (< x.7), pull just the needed deps from a newer compose.
    - name: Check if PGDG dependency repo is needed
      ansible.builtin.set_fact:
        _pgdg_needs_deps_repo: >-
          {{ ansible_facts['distribution_version'] is version((_pgdg_el_major ~ '.7'), '<') }}

    - name: Fail if system is too old for PGDG and no deps repo configured
      ansible.builtin.fail:
        msg: >-
          This host is {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}.
          PGDG packages require libraries from RHEL {{ _pgdg_el_major }}.7+.
          Set pgdg_deps_baseurl in inventory to a RHEL {{ _pgdg_el_major }}.8+ compose
          BaseOS URL so the required openldap/openssl/openssh can be pulled.
      when:
        - _pgdg_needs_deps_repo | bool
        - pgdg_deps_baseurl is not defined or (pgdg_deps_baseurl | string | trim | length == 0)

    - name: Add temporary repo for PGDG library dependencies
      ansible.builtin.yum_repository:
        name: pgdg-deps
        description: "Temporary BaseOS for PGDG library deps (openldap, openssl, openssh)"
        baseurl: "{{ pgdg_deps_baseurl }}"
        gpgcheck: false
        enabled: false
      when: _pgdg_needs_deps_repo | bool

    - name: Update PGDG dependency libraries and openssh from newer compose
      ansible.builtin.dnf:
        name:
          - openldap
          - openssl-libs
          - openssh-server
          - openssh-clients
        state: latest
        allowerasing: true
        disablerepo: "*"
        enablerepo: pgdg-deps
      when: _pgdg_needs_deps_repo | bool

    - name: Restart sshd after openssl-libs upgrade
      ansible.builtin.systemd:
        name: sshd
        state: restarted
      when: _pgdg_needs_deps_repo | bool

    - name: Wait for sshd to come back after restart
      ansible.builtin.wait_for:
        port: 22
        host: "{{ ansible_host | default(inventory_hostname) }}"
        delay: 2
        timeout: 30
      when: _pgdg_needs_deps_repo | bool

    - name: Remove temporary PGDG deps repo
      ansible.builtin.yum_repository:
        name: pgdg-deps
        state: absent
      when: _pgdg_needs_deps_repo | bool

    - name: Install the PGDG repository RPM
      ansible.builtin.dnf:
        name: "{{ _pgdg_repo_rpm }}"
        state: present
        disable_gpg_check: true
        releasever: "{{ _pgdg_el_major }}"

    - name: Fix PGDG repo files to use EL major version instead of pinned releasever
      ansible.builtin.command: >-
        sed -i 's|/rhel-$releasever-|/rhel-{{ _pgdg_el_major }}-|g'
        /etc/yum.repos.d/pgdg-redhat-all.repo
      register: _pgdg_fix_releasever
      changed_when: _pgdg_fix_releasever.rc == 0

    - name: Disable the built-in PostgreSQL module (EL 8/9 modularity)
      ansible.builtin.command: dnf -qy module disable postgresql
      register: _pgdg_module_disable
      changed_when: "'Nothing to do' not in (_pgdg_module_disable.stdout | default(''))"
      failed_when: false
      when: ansible_facts['distribution_major_version'] | int < 10

    - name: Disable PGDG repos for PostgreSQL versions we do not use
      ansible.builtin.command: >-
        dnf config-manager --set-disabled pgdg{{ item }}
      loop: "{{ range(10, 20) | list | reject('equalto', postgresql_major | int) | list }}"
      changed_when: true
      failed_when: false

    - name: Clean DNF metadata after PGDG repo install
      ansible.builtin.command: dnf clean all
      changed_when: true

    - name: Install PostgreSQL from PGDG
      ansible.builtin.dnf:
        name:
          - "postgresql{{ postgresql_major }}-server"
          - "postgresql{{ postgresql_major }}-contrib"
        state: present

    - name: Install python3-psycopg2 for Ansible PostgreSQL modules
      ansible.builtin.dnf:
        name: python3-psycopg2
        state: present

    # --- PostgreSQL data directory & service ---
    - name: Set PGDATA for PostgreSQL service (sysconfig)
      ansible.builtin.lineinfile:
        path: "{{ _pgsql_sysconfig }}"
        regexp: '^PGDATA='
        line: 'PGDATA={{ pgsql_data_dir }}'
        create: true
        mode: "0644"

    - name: Create systemd drop-in directory for PostgreSQL
      when: not (pgsql_data_dir is match('^/var/lib/pgsql/'))
      ansible.builtin.file:
        path: "/etc/systemd/system/postgresql-{{ postgresql_major }}.service.d"
        state: directory
        mode: "0755"

    - name: Install PostgreSQL systemd drop-in for custom PGDATA
      when: not (pgsql_data_dir is match('^/var/lib/pgsql/'))
      ansible.builtin.copy:
        dest: "/etc/systemd/system/postgresql-{{ postgresql_major }}.service.d/pgdata.conf"
        mode: "0644"
        content: |
          [Service]
          Environment=PGDATA={{ pgsql_data_dir }}

    - name: Reload systemd after PostgreSQL PGDATA drop-in
      when: not (pgsql_data_dir is match('^/var/lib/pgsql/'))
      ansible.builtin.systemd:
        daemon_reload: true

    - name: SELinux labeling for custom PostgreSQL data path
      ansible.builtin.command: >-
        semanage fcontext -a -t postgresql_db_t "{{ pgsql_data_dir }}(/.*)?"
      register: bench_pgsql_semanage
      changed_when: bench_pgsql_semanage.rc == 0
      failed_when: >-
        bench_pgsql_semanage.rc != 0
        and ('already defined' not in (bench_pgsql_semanage.stderr | default('')))
      when:
        - (ansible_facts['selinux'] | default({})).status | default('disabled') == 'enabled'
        - not (pgsql_data_dir is match('^/var/lib/pgsql/'))

    - name: Check whether PostgreSQL cluster is already initialized
      ansible.builtin.stat:
        path: "{{ pgsql_data_dir }}/PG_VERSION"
      register: pgsql_data_initialized

    - name: Remove stale PGDATA path before initdb
      ansible.builtin.file:
        path: "{{ pgsql_data_dir }}"
        state: absent
      when: not pgsql_data_initialized.stat.exists

    - name: Allow postgres user to create PGDATA under bench data mount
      ansible.builtin.file:
        path: "{{ bench_data_mount }}"
        owner: postgres
        group: postgres
        mode: "0755"
      when:
        - bench_storage_enable | default(true) | bool
        - not (pgsql_data_dir is match('^/var/lib/pgsql/'))

    - name: Initialize PostgreSQL cluster on {{ pgsql_data_dir }}
      become_user: postgres
      ansible.builtin.command: "/usr/pgsql-{{ postgresql_major }}/bin/initdb -D {{ pgsql_data_dir }}"
      args:
        creates: "{{ pgsql_data_dir }}/PG_VERSION"

    - name: Apply SELinux file context on PostgreSQL data directory
      ansible.builtin.command: restorecon -Rv {{ pgsql_data_dir }}
      changed_when: false
      when:
        - (ansible_facts['selinux'] | default({})).status | default('disabled') == 'enabled'
        - not (pgsql_data_dir is match('^/var/lib/pgsql/'))

    - name: Enable and start PostgreSQL service
      ansible.builtin.systemd:
        name: "{{ postgresql_service_name }}"
        enabled: true
        state: started
        daemon_reload: true

    # --- PostgreSQL configuration ---
    - name: Set max_connections for benchmark workload
      become_user: postgres
      community.postgresql.postgresql_alter_system:
        param: max_connections
        value: "{{ pgsql_max_connections | default(1000) | string }}"
        login_db: postgres
      register: pgsql_max_connections_alter

    - name: Restart PostgreSQL after max_connections change
      ansible.builtin.systemd:
        name: "{{ postgresql_service_name }}"
        state: restarted
      when: pgsql_max_connections_alter.changed | default(false)

    - name: Set postgres superuser password (local peer auth)
      community.postgresql.postgresql_user:
        name: "{{ pgsql_superuser }}"
        password: "{{ pgsql_superuser_password }}"
        role_attr_flags: SUPERUSER
        login_user: "{{ pgsql_superuser }}"
      become_user: postgres
      no_log: true

    - name: Create benchmark database role
      community.postgresql.postgresql_user:
        name: "{{ pgsql_benchmark_user }}"
        password: "{{ pgsql_benchmark_password }}"
        login_host: "{{ _pgsql_connect_host }}"
        login_user: "{{ pgsql_superuser }}"
        login_password: "{{ pgsql_superuser_password }}"
        port: "{{ pgsql_port }}"
        db: postgres
      no_log: true

    - name: Create benchmark database
      community.postgresql.postgresql_db:
        name: "{{ pgsql_benchmark_db }}"
        owner: "{{ pgsql_benchmark_user }}"
        login_host: "{{ _pgsql_connect_host }}"
        login_user: "{{ pgsql_superuser }}"
        login_password: "{{ pgsql_superuser_password }}"
        port: "{{ pgsql_port }}"
      no_log: true

    - name: Grant all privileges on benchmark database to benchmark user
      community.postgresql.postgresql_query:
        login_host: "{{ _pgsql_connect_host }}"
        login_user: "{{ pgsql_superuser }}"
        login_password: "{{ pgsql_superuser_password }}"
        port: "{{ pgsql_port }}"
        db: postgres
        query: GRANT ALL PRIVILEGES ON DATABASE "{{ pgsql_benchmark_db }}" TO "{{ pgsql_benchmark_user }}"
      no_log: true

    - name: Grant CREATE on public schema for benchmark user (PostgreSQL 15+)
      community.postgresql.postgresql_query:
        login_host: "{{ _pgsql_connect_host }}"
        login_user: "{{ pgsql_superuser }}"
        login_password: "{{ pgsql_superuser_password }}"
        port: "{{ pgsql_port }}"
        db: "{{ pgsql_benchmark_db }}"
        query: GRANT CREATE ON SCHEMA public TO "{{ pgsql_benchmark_user }}"
      no_log: true

    # --- Network access ---
    - name: Allow remote PostgreSQL connections
      community.postgresql.postgresql_alter_system:
        param: listen_addresses
        value: "{{ pgsql_listen_addresses }}"
        login_host: "{{ _pgsql_connect_host }}"
        login_user: "{{ pgsql_superuser }}"
        login_password: "{{ pgsql_superuser_password }}"
        port: "{{ pgsql_port }}"
        login_db: postgres
      register: pgsql_listen_alter
      no_log: true

    - name: Allow password-authenticated clients in pg_hba.conf
      community.postgresql.postgresql_pg_hba:
        dest: "{{ pgsql_data_dir }}/pg_hba.conf"
        contype: host
        address: "{{ pgsql_benchmark_client_hba_network }}"
        databases: all
        users: all
        method: "{{ pgsql_client_auth_method | default('scram-sha-256') }}"
        state: present
      register: pgsql_hba_remote
      no_log: true

    - name: Restart PostgreSQL after network access changes
      ansible.builtin.systemd:
        name: "{{ postgresql_service_name }}"
        state: restarted
      when: (pgsql_listen_alter.changed | default(false)) or (pgsql_hba_remote.changed | default(false))

    - name: Verify PostgreSQL is listening on the network
      ansible.builtin.wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: "{{ pgsql_port | int }}"
        timeout: 30
      when: pgsql_listen_addresses | default('*') not in ['localhost', '127.0.0.1']

    # --- Firewall ---
    - name: Check iptables ACCEPT rule for PostgreSQL
      ansible.builtin.command: iptables -C INPUT -p tcp --dport {{ pgsql_port }} -j ACCEPT
      register: bench_iptables_check
      changed_when: false
      failed_when: false
      when: bench_manage_firewall | default(true) | bool

    - name: Open PostgreSQL port in iptables
      ansible.builtin.command: iptables -I INPUT -p tcp --dport {{ pgsql_port }} -j ACCEPT
      when:
        - bench_manage_firewall | default(true) | bool
        - bench_iptables_check.rc | default(1) != 0
      changed_when: bench_iptables_check.rc | default(1) != 0

    - name: Verify PostgreSQL accepts TCP on bench management address
      ansible.builtin.wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: "{{ pgsql_port | int }}"
        timeout: 15

    # --- PCP monitoring ---
    - name: Install PCP packages on bench
      ansible.builtin.dnf:
        name:
          - pcp
          - pcp-system-tools
          - pcp-gui
        state: present
      when: pcp_capture_enable | default(true) | bool

    - name: Enable and start pmcd on bench
      ansible.builtin.systemd:
        name: pmcd
        enabled: true
        state: started
      when: pcp_capture_enable | default(true) | bool

    - name: Ensure bench metrics work directory exists
      ansible.builtin.file:
        path: "{{ hammerdb_remote_workdir }}"
        state: directory
        mode: "0755"
      when: pcp_capture_enable | default(true) | bool

    - name: Verify PCP can sample metrics on bench
      ansible.builtin.command:
        argv: "{{ ['pmprobe'] + pcp_pmdumptext_smoke_metrics }}"
      register: bench_pcp_smoke
      changed_when: false
      when:
        - pcp_capture_enable | default(true) | bool
        - pcp_setup_smoke_test | default(true) | bool

    - name: Show bench PCP smoke sample
      ansible.builtin.debug:
        msg: "{{ bench_pcp_smoke.stdout_lines | default([]) }}"
      when:
        - pcp_capture_enable | default(true) | bool
        - pcp_setup_smoke_test | default(true) | bool
        - bench_pcp_smoke is defined

- name: Provision HammerDB load generator (client)
  hosts: client
  gather_facts: true
  vars:
    _bench_inventory_name: "{{ groups['bench'][0] }}"
    pgsql_host: "{{ hostvars[_bench_inventory_name]['ansible_host'] | default(_bench_inventory_name) }}"
    pgsql_port: "{{ hostvars[_bench_inventory_name]['pgsql_port'] }}"
    pgsql_superuser: "{{ hostvars[_bench_inventory_name]['pgsql_superuser'] }}"
    pgsql_superuser_password: "{{ hostvars[_bench_inventory_name]['pgsql_superuser_password'] }}"
    pgsql_benchmark_user: "{{ hostvars[_bench_inventory_name]['pgsql_benchmark_user'] }}"
    pgsql_benchmark_password: "{{ hostvars[_bench_inventory_name]['pgsql_benchmark_password'] }}"
    pgsql_benchmark_db: "{{ hostvars[_bench_inventory_name]['pgsql_benchmark_db'] }}"
    hammerdb_virtual_users: "{{ hostvars[_bench_inventory_name].get('hammerdb_virtual_users', 1) }}"
    pcp_pmdumptext_smoke_metrics:
      - kernel.all.cpu.user
      - mem.util.used
      - disk.all.read
  tasks:
    - name: Require exactly one bench host in inventory
      ansible.builtin.assert:
        that:
          - groups['bench'] | length == 1
        fail_msg: setup.yaml client provisioning expects exactly one host in [bench].

    - name: Install base packages for load generator
      ansible.builtin.dnf:
        name:
          - python3
          - python3-psycopg2
          - podman
          - glibc-common
        state: present

    - name: Check whether HammerDB container image is present locally
      ansible.builtin.command: podman image exists {{ hammerdb_container_image }}
      register: hammerdb_image_present
      changed_when: false
      failed_when: false

    - name: Pull HammerDB container image when missing locally
      ansible.builtin.command: podman pull {{ hammerdb_container_image }}
      register: hammerdb_pull
      changed_when: hammerdb_pull.rc == 0
      failed_when: hammerdb_pull.rc != 0
      when: hammerdb_image_present.rc != 0

    - name: Ensure HammerDB remote work directory exists
      ansible.builtin.file:
        path: "{{ hammerdb_remote_workdir }}"
        state: directory
        mode: "0755"

    - name: Deploy HammerDB TPC-C scripts for later benchmark runs
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/{{ item.src }}"
        dest: "{{ hammerdb_remote_workdir }}/{{ item.dest }}"
        mode: "0644"
      loop:
        - { src: hammerdb-tpcc-setup.tcl.j2, dest: setup.tcl }
        - { src: hammerdb-tpcc-run.tcl.j2, dest: run.tcl }
        - { src: hammerdb-tpcc-cleanup.tcl.j2, dest: cleanup.tcl }

    - name: Verify HammerDB CLI runs in container
      ansible.builtin.command: >-
        podman run --rm {{ hammerdb_container_image }} ./hammerdbcli help
      register: hammerdb_cli_help
      changed_when: false

    # --- PCP monitoring ---
    - name: Install PCP packages on client
      ansible.builtin.dnf:
        name:
          - pcp
          - pcp-system-tools
          - pcp-gui
        state: present
      when: pcp_capture_enable | default(true) | bool

    - name: Enable and start pmcd on client
      ansible.builtin.systemd:
        name: pmcd
        enabled: true
        state: started
      when: pcp_capture_enable | default(true) | bool

    - name: Verify PCP can sample metrics on client
      ansible.builtin.command:
        argv: "{{ ['pmprobe'] + pcp_pmdumptext_smoke_metrics }}"
      register: client_pcp_smoke
      changed_when: false
      when:
        - pcp_capture_enable | default(true) | bool
        - pcp_setup_smoke_test | default(true) | bool

    - name: Show client PCP smoke sample
      ansible.builtin.debug:
        msg: "{{ client_pcp_smoke.stdout_lines | default([]) }}"
      when:
        - pcp_capture_enable | default(true) | bool
        - pcp_setup_smoke_test | default(true) | bool
        - client_pcp_smoke is defined

    # --- Connectivity verification ---
    - name: Verify client TCP connectivity to PostgreSQL on bench
      block:
        - name: Wait for PostgreSQL port on bench from client
          ansible.builtin.wait_for:
            host: "{{ pgsql_host }}"
            port: "{{ pgsql_port | int }}"
            timeout: 60
      rescue:
        - name: Report bench connectivity failure
          ansible.builtin.fail:
            msg: >-
              Client cannot reach PostgreSQL at {{ pgsql_host }}:{{ pgsql_port }}.
              Confirm VPN is connected on the ansible controller, re-run the bench play
              (iptables and listen_addresses), and on bench-vm check:
              ss -tlnp | grep {{ pgsql_port }}; iptables -L INPUT -n | grep {{ pgsql_port }}.

    - name: Verify client can authenticate to PostgreSQL on bench
      community.postgresql.postgresql_ping:
        login_host: "{{ pgsql_host }}"
        login_port: "{{ pgsql_port }}"
        login_user: "{{ pgsql_benchmark_user }}"
        login_password: "{{ pgsql_benchmark_password }}"
        db: "{{ pgsql_benchmark_db }}"
      no_log: true
