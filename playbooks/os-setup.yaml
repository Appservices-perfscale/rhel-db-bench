---
# Pin remote hosts to a specific RHEL build, distro-sync, reboot, and write facts.json.
#
# Same major (e.g. 9.4 → 9.7): dnf distro-sync against rel-eng / ScaleLab compose.
# Different major (e.g. 9.x → 10.x): Foreman re-provision via PXE (Badfish power-cycle).
#
# Targets [remote] (bench + client). Use --limit to choose which hosts to change:
#   ansible-playbook playbooks/os-setup.yaml -i inventory.ini -i inventory.local.ini --limit bench
#
# Run before playbooks/setup.yaml on fresh or reprovisioned hosts.

- name: Sync OS to requested RHEL build (remote)
  hosts: remote
  gather_facts: true
  serial: 1
  vars:
    _os_prep_facts_dir: >-
      {{
        (perf_results_path | default('') | string | trim | length > 0)
        | ternary(
            perf_results_path | string | trim ~ '/os-prep',
            playbook_dir ~ '/../results/os-prep'
          )
      }}
  tasks:
    - name: Skip host when OS prep is disabled
      ansible.builtin.meta: end_host
      when: not (os_prep_enable | default(true) | bool)

    - name: Require compose mirror, prefix, or override for this host
      ansible.builtin.assert:
        that:
          - (os_prep_rhel_release_root_override | default('') | string | trim | length > 0)
            or (os_prep_rhel_release_root_prefix | default('') | string | trim | length > 0)
            or (os_prep_rhel_release_mirror | default('') | string | trim | length > 0)
        fail_msg: >-
          Set os_prep_rhel_release_mirror under [remote:vars] in inventory.ini.
      changed_when: false

    - name: Require os_prep_rhel_release_id for this host
      ansible.builtin.assert:
        that:
          - os_prep_rhel_release_id is defined
          - os_prep_rhel_release_id | string | trim | length > 0
        fail_msg: >-
          Set os_prep_rhel_release_id (bench: -e bench_rhel_release_id=10.2 or inventory default).
      changed_when: false

    - name: Detect current and target OS major
      ansible.builtin.set_fact:
        os_prep_current_major: "{{ ansible_facts.distribution_major_version | string }}"
        os_prep_target_major: "{{ _os_prep_rhel_major }}"
        os_prep_major_upgrade_needed: >-
          {{ (ansible_facts.distribution_major_version | string) != (_os_prep_rhel_major | string) }}
        os_prep_post_foreman_distro_sync_needed: false
      changed_when: false

    - name: Resolve Foreman install OS for major upgrade
      when: os_prep_major_upgrade_needed | bool
      ansible.builtin.include_tasks: tasks/os-prep-resolve-foreman-os.yaml

    - name: Show OS prep plan
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}: current RHEL {{ ansible_facts.distribution_version }}
          → target {{ os_prep_rhel_release_id }}
          ({% if os_prep_major_upgrade_needed | bool %}Foreman rebuild
          {{ os_prep_current_major }}→{{ _foreman_os_resolve.foreman_release_id | default(os_prep_target_major) }}
          {%- if os_prep_post_foreman_distro_sync_needed | bool -%}
          , then distro-sync to {{ os_prep_rhel_release_id }}
          {%- endif -%}
          {% else %}distro-sync {{ os_prep_rhel_release_root }}{% endif %})

    - name: Stop services and remove provisioned packages
      when: not (os_prep_major_upgrade_needed | bool)
      ansible.builtin.include_tasks: tasks/os-prep-remove-provisioned-packages.yaml

    - name: Major version change via Foreman rebuild
      when: os_prep_major_upgrade_needed | bool
      ansible.builtin.include_tasks: tasks/os-prep-foreman-rebuild.yaml

    - name: Stop services and remove provisioned packages before post-Foreman distro-sync
      when: os_prep_post_foreman_distro_sync_needed | default(false) | bool
      ansible.builtin.include_tasks: tasks/os-prep-remove-provisioned-packages.yaml

    - name: Distro-sync to target release after Foreman rebuild
      when: os_prep_post_foreman_distro_sync_needed | default(false) | bool
      ansible.builtin.include_tasks: tasks/os-prep-distro-sync.yaml

    - name: Same-major pin via distro-sync
      when: not (os_prep_major_upgrade_needed | bool)
      ansible.builtin.include_tasks: tasks/os-prep-distro-sync.yaml

- name: Collect facts after reboot and write facts.json (remote)
  hosts: remote
  gather_facts: true
  serial: 1
  vars:
    ansible_python_interpreter: auto_silent
    _os_prep_facts_dir: >-
      {{
        (perf_results_path | default('') | string | trim | length > 0)
        | ternary(
            perf_results_path | string | trim ~ '/os-prep',
            playbook_dir ~ '/../results/os-prep'
          )
      }}
  tasks:
    - name: Skip host when OS prep is disabled
      ansible.builtin.meta: end_host
      when: not (os_prep_enable | default(true) | bool)

    - name: Read redhat-release after OS prep
      ansible.builtin.command: rpm -q redhat-release
      register: os_prep_redhat_release_post
      changed_when: false

    - name: Confirm redhat-release after OS prep
      ansible.builtin.assert:
        that:
          - os_prep_rhel_release_id | string in os_prep_redhat_release_post.stdout
        fail_msg: >-
          After OS prep, expected '{{ os_prep_rhel_release_id }}' in redhat-release;
          got: {{ os_prep_redhat_release_post.stdout }}
      changed_when: false

    - name: Confirm Ansible sees the expected RHEL major.minor
      ansible.builtin.assert:
        that:
          - ansible_facts['os_family'] == 'RedHat'
          - os_prep_rhel_release_id | string in ansible_facts['distribution_version']
        fail_msg: >-
          ansible_distribution={{ ansible_facts['distribution'] | default('unknown') }}
          {{ ansible_facts['distribution_version'] | default('') }};
          expected release id {{ os_prep_rhel_release_id }}.
      changed_when: false

    - name: Show kernel after OS prep
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}: kernel {{ ansible_facts['kernel'] }},
          {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}

    - name: Ensure local facts output directory exists
      ansible.builtin.file:
        path: "{{ _os_prep_facts_dir }}/{{ inventory_hostname }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      become: false

    - name: Write Ansible facts to facts.json on controller
      ansible.builtin.copy:
        content: "{{ ansible_facts | to_nice_json }}\n"
        dest: "{{ _os_prep_facts_dir }}/{{ inventory_hostname }}/facts.json"
        mode: "0644"
      delegate_to: localhost
      become: false
