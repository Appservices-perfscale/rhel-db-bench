---
# Automated CPT orchestrator: detect new RHEL GA → schedule → benchmark.
#
# Single command to run the full automated pipeline:
#   ansible-playbook playbooks/release-orchestrate.yaml
#
# What it does:
#   1. Run release-watcher.py to check for new GA composes
#   2. If new release found:
#      a. Reserve ScaleLab hosts (auto-schedule.yaml) — with ostype + wipe if cross-major
#      b. Pin exact GA on bench via os-setup (client stays RHEL 9.4 from inventory.ini)
#      c. Provision PostgreSQL, HammerDB, PCP (setup.yaml or setup_EL9.yaml)
#      d. Run benchmark matrix (run-matrix.yaml)
#      e. Update state file so we don't re-test the same compose
#      f. Release ScaleLab hosts (scalelab-cleanup.yaml)
#   3. If no new release: exit cleanly
#
# Use with cron / systemd timer for fully automatic CPT:
#   0 6 * * * cd /path/to/DB-CPT-RHEL && ansible-playbook playbooks/release-orchestrate.yaml
#
# Manual override (skip watcher, test a specific release):
#   ansible-playbook playbooks/release-orchestrate.yaml \
#     -e "force_release_id=10.2" \
#     -e "force_compose_root=https://download.eng.pnq.redhat.com/rhel-10/rel-eng/RHEL-10/latest-RHEL-10.2.0"

- name: CPT release orchestrator
  hosts: localhost
  connection: local
  gather_facts: false
  become: false

  vars:
    project_root: "{{ playbook_dir }}/.."
    config_file: "{{ project_root }}/config/cpt-automation.yaml"
    state_file: "{{ project_root }}/state/last-tested.json"
    generated_inventory: "{{ project_root }}/inventory/generated/rhel-ga.ini"
    watcher_script: "{{ project_root }}/scripts/release-watcher.py"

  tasks:

    # ── Step 0: Detect new release ──────────────────────────────────────

    - name: Check for new RHEL GA release
      when: force_release_id is not defined
      ansible.builtin.command: >-
        python3 {{ watcher_script }}
        --config {{ config_file }}
        --project-root {{ project_root }}
        --print
      register: watcher_result
      changed_when: watcher_result.rc == 2
      failed_when: watcher_result.rc not in [0, 2]

    - name: Parse watcher output
      when: force_release_id is not defined
      ansible.builtin.set_fact:
        _watcher: "{{ watcher_result.stdout | from_json }}"
      changed_when: false

    - name: Stop if no new release detected
      when:
        - force_release_id is not defined
        - not (_watcher.changed | default(false))
      ansible.builtin.debug:
        msg: "No new RHEL release detected. Nothing to do."

    - name: End play when nothing to test
      when:
        - force_release_id is not defined
        - not (_watcher.changed | default(false))
      ansible.builtin.meta: end_play

    # ── Step 1: Resolve release parameters ──────────────────────────────

    - name: Set release facts from watcher
      when: force_release_id is not defined
      ansible.builtin.set_fact:
        cpt_release_id: "{{ _watcher.release_id }}"
        cpt_major: "{{ _watcher.major }}"
        cpt_compose_root: "{{ _watcher.compose_root }}"
        cpt_compose_build: "{{ _watcher.compose_build }}"
        cpt_target: "{{ _watcher.target }}"
        cpt_ostype: "{{ _watcher.ostype | default('') }}"
        cpt_needs_wipe: "{{ _watcher.needs_wipe | default(false) }}"
      changed_when: false

    - name: Set release facts from manual override
      when: force_release_id is defined
      ansible.builtin.set_fact:
        cpt_release_id: "{{ force_release_id }}"
        cpt_major: "{{ force_release_id.split('.')[0] }}"
        cpt_compose_root: "{{ force_compose_root }}"
        cpt_compose_build: "manual-{{ force_release_id }}"
        cpt_target: "{{ force_release_id }}.0"
        cpt_ostype: "{{ force_ostype | default('') }}"
        cpt_needs_wipe: "{{ force_needs_wipe | default(false) | bool }}"
      changed_when: false

    - name: Write bench inventory overlay for manual override
      when: force_release_id is defined
      ansible.builtin.copy:
        dest: "{{ generated_inventory }}"
        mode: "0644"
        content: |
          # Auto-generated by release-orchestrate.yaml (manual override) — do not edit.
          # Bench overlay for RHEL {{ cpt_release_id }}. Client stays at inventory.ini [client:vars].
          [bench:vars]
          os_prep_rhel_release_root={{ cpt_compose_root }}
          os_prep_rhel_release_id={{ cpt_release_id }}

    - name: Show detected release
      ansible.builtin.debug:
        msg:
          - "New release: RHEL {{ cpt_release_id }} (major {{ cpt_major }})"
          - "Compose: {{ cpt_compose_root }}"
          - "Build ID: {{ cpt_compose_build }}"
          - "Cross-major wipe: {{ cpt_needs_wipe }} (ostype: {{ cpt_ostype | default('n/a') }})"

    # ── Step 2: Build inventory args ────────────────────────────────────

    - name: Build common inventory arguments
      ansible.builtin.set_fact:
        _inv_args: >-
          -i "{{ project_root }}/inventory.ini"
          {{ '-i "' ~ project_root ~ '/inventory.local.ini"'
             if lookup('file', project_root ~ '/inventory.local.ini', errors='ignore') is not none
             else '' }}
          -i "{{ generated_inventory }}"
      changed_when: false

    # ── Step 3: Reserve ScaleLab hosts ──────────────────────────────────

    - name: Reserve ScaleLab hosts (auto-schedule)
      ansible.builtin.command: >-
        ansible-playbook {{ _inv_args }}
        playbooks/auto-schedule.yaml
        -e "workload_name=DB-CPT auto RHEL {{ cpt_release_id }}"
        {{ '-e quads_ostype="' ~ cpt_ostype ~ '"' if (cpt_needs_wipe | bool) and (cpt_ostype | length > 0) else '' }}
        {{ '-e quads_wipe=true' if (cpt_needs_wipe | bool) else '' }}
      args:
        chdir: "{{ project_root }}"
      register: schedule_result

    # Refresh inventory args now that inventory.local.ini exists
    - name: Refresh inventory arguments after scheduling
      ansible.builtin.set_fact:
        _inv_args: >-
          -i "{{ project_root }}/inventory.ini"
          -i "{{ project_root }}/inventory.local.ini"
          -i "{{ generated_inventory }}"
      changed_when: false

    # ── Step 4: Pin OS on both hosts ────────────────────────────────────
    #   bench → new GA (from generated overlay)
    #   client → always RHEL 9.4 (from inventory.ini [client:vars])

    - name: Pin RHEL on bench and client (os-setup)
      ansible.builtin.command: >-
        ansible-playbook {{ _inv_args }} playbooks/os-setup.yaml
      args:
        chdir: "{{ project_root }}"
      register: os_setup_result

    # ── Step 5: Provision PostgreSQL, HammerDB, PCP ─────────────────────

    - name: Choose setup playbook (setup_EL9 for bench RHEL 9.0, setup otherwise)
      ansible.builtin.set_fact:
        _setup_playbook: >-
          {{ 'playbooks/setup_EL9.yaml'
             if cpt_release_id is match('^9\.0')
             else 'playbooks/setup.yaml' }}
      changed_when: false

    - name: Run setup ({{ _setup_playbook }})
      ansible.builtin.command: >-
        ansible-playbook {{ _inv_args }} {{ _setup_playbook }}
      args:
        chdir: "{{ project_root }}"
      register: setup_result

    # ── Step 6: Benchmark matrix ────────────────────────────────────────

    - name: Run benchmark matrix
      ansible.builtin.command: >-
        ansible-playbook {{ _inv_args }} playbooks/run-matrix.yaml
      args:
        chdir: "{{ project_root }}"
      register: matrix_result

    # ── Step 7: Update state file ───────────────────────────────────────

    - name: Load current state
      ansible.builtin.set_fact:
        _state: "{{ lookup('file', state_file, errors='ignore') | default('{}', true) | from_json }}"
      changed_when: false

    - name: Update state with tested release
      ansible.builtin.copy:
        dest: "{{ state_file }}"
        mode: "0644"
        content: |
          {{ _updated_state | to_nice_json }}
      vars:
        _by_target: "{{ _state.get('by_target', {}) | combine({cpt_target: {'compose_build': cpt_compose_build, 'release_id': cpt_release_id, 'tested_at': now(utc=true).isoformat()}}) }}"
        _updated_state:
          by_target: "{{ _by_target }}"
          last_host_major: "{{ cpt_major | int }}"

    # ── Step 8: Release ScaleLab hosts ──────────────────────────────────

    - name: Release ScaleLab hosts (scalelab-cleanup)
      ansible.builtin.command: >-
        ansible-playbook playbooks/scalelab-cleanup.yaml
      args:
        chdir: "{{ project_root }}"
      register: cleanup_result
      ignore_errors: true

    - name: Show completion summary
      ansible.builtin.debug:
        msg:
          - "CPT completed for RHEL {{ cpt_release_id }} ({{ cpt_compose_build }})"
          - "Results: results/RHEL_{{ cpt_release_id }}/"
          - "State updated: {{ state_file }}"
          - "ScaleLab cleanup: {{ 'OK' if not (cleanup_result.failed | default(false)) else 'FAILED (hosts may still be reserved)' }}"
