---
# Matrix driver: cleanup → site.yml for each (virtual_users, run_index).
#
# Runs the complete benchmark cycle per iteration: cleanup (reset DB + caches)
# followed by site.yml (test + master JSON assembly). This means you can run
# the full matrix with a single command and every iteration starts from a
# clean, cold state.
#
# From project root:
#   ansible-playbook playbooks/run-matrix.yaml
#
# Override VU list or how many repeats per VU:
#   ansible-playbook playbooks/run-matrix.yaml -e 'virtual_users_list=[8,16,32]' -e 'run_count=2'
#
# Skip cleanup between runs (warm-start benchmarking):
#   ansible-playbook playbooks/run-matrix.yaml -e 'matrix_cleanup_between_runs=false'
#
# Override inventory or results parent directory:
#   ansible-playbook playbooks/run-matrix.yaml -e 'matrix_inventory=/path/to/inventory.ini'
#   ansible-playbook playbooks/run-matrix.yaml -e 'matrix_results_subdir=results/matrix-20260411'
#
# Each iteration sets perf_run_stamp (controller clock) so artifacts get unique names under perf_results_path:
#   <stamp>-benchmark-report.json, <stamp>-bench-metrics-samples.log (bench),
#   <stamp>-client-metrics-samples.log (load generator), etc.

- name: Gather bench OS version for results directory naming
  hosts: bench
  gather_facts: true
  tasks:
    - name: Persist OS version tag from gathered facts
      ansible.builtin.set_fact:
        _os_version_tag: >-
          {{ (ansible_distribution | replace('RedHat', 'RHEL')) ~ '_' ~ ansible_distribution_version }}

- name: Run HammerDB / site.yml matrix over virtual users and repeat count
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    virtual_users_list: [ 28, 56, 112, 224, 448, 896 ]
    run_count: 3
    matrix_cleanup_between_runs: true
    project_root: "{{ playbook_dir ~ '/..' }}"
    matrix_inventory: "{{ matrix_inventory_override | default(project_root ~ '/inventory.ini') }}"
    _bench: "{{ groups['bench'][0] }}"
    _os_version_tag: "{{ hostvars[_bench]['_os_version_tag'] }}"
    results_dir: "{{ project_root }}/{{ matrix_results_subdir | default('results') }}"
    os_results_dir: "{{ results_dir }}/{{ _os_version_tag }}"
    archive_dir: "{{ os_results_dir }}/archive"

  tasks:
    - name: Ensure results and archive directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ os_results_dir }}"
        - "{{ archive_dir }}"

    - name: Build inventory arguments once
      ansible.builtin.set_fact:
        _matrix_inv_args: >-
          -i "{{ matrix_inventory }}"
          {{ '-i "' ~ project_root ~ '/inventory.local.ini"'
             if lookup('file', project_root ~ '/inventory.local.ini', errors='ignore') is not none
             else '' }}
      changed_when: false

    - name: Run cleanup + site.yml for each (VU, run)
      ansible.builtin.shell: |
        set -euo pipefail
        VU="{{ item[0] }}"
        RUN="{{ item[1] }}"
        RUN_TS="$(date +%Y%m%d-%H%M%S)"
        INSTANCE_SAFE="vu${VU}_run${RUN}_${RUN_TS}"
        LOGFILE="${INSTANCE_SAFE}.log"
        ARCHIVE_SUBDIR="{{ archive_dir }}/${INSTANCE_SAFE}"

        mkdir -p "{{ os_results_dir }}" "${ARCHIVE_SUBDIR}"

        {
          echo "========== Matrix: VU=${VU} repeat=${RUN} stamp=${RUN_TS} =========="
          cd "{{ project_root }}"

          INV_ARGS=( -i "{{ matrix_inventory }}" )
          if [ -f "{{ project_root }}/inventory.local.ini" ]; then
            INV_ARGS+=( -i "{{ project_root }}/inventory.local.ini" )
          fi

          # ── Cleanup: reset DB, caches, and PCP state before each run ──
          if [ "{{ matrix_cleanup_between_runs | bool | lower }}" = "true" ]; then
            echo "---------- Cleanup before VU=${VU} run=${RUN} ----------"
            ansible-playbook "${INV_ARGS[@]}" playbooks/cleanup.yaml
          fi

          # ── Benchmark: full pipeline (test + master JSON assembly) ──
          echo "---------- Benchmark VU=${VU} run=${RUN} ----------"
          ansible-playbook "${INV_ARGS[@]}" playbooks/site.yml \
            -e "hammerdb_virtual_users=${VU}" \
            -e "perf_results_path={{ results_dir }}" \
            -e "perf_run_stamp=${RUN_TS}"

          for f in \
            "{{ os_results_dir }}/${RUN_TS}-benchmark-report.json" \
            "{{ os_results_dir }}/${RUN_TS}-results.json" \
            "{{ os_results_dir }}/${RUN_TS}-monitoring.json" \
            "{{ os_results_dir }}/${RUN_TS}-master.json" \
            "{{ os_results_dir }}/${RUN_TS}-bench-metrics-samples.log" \
            "{{ os_results_dir }}/${RUN_TS}-client-metrics-samples.log"; do
            [ -f "$f" ] && cp -f "$f" "${ARCHIVE_SUBDIR}/" || true
          done
        } 2>&1 | tee "{{ os_results_dir }}/${LOGFILE}"
        cp -f "{{ os_results_dir }}/${LOGFILE}" "${ARCHIVE_SUBDIR}/" || true
        exit "${PIPESTATUS[0]}"
      args:
        executable: /bin/bash
      loop: "{{ virtual_users_list | product(range(1, (run_count | int) + 1)) | list }}"
      loop_control:
        label: "vu{{ item[0] }} run{{ item[1] }}"
      register: matrix_run
      ignore_errors: true

    - name: Show matrix summary
      ansible.builtin.debug:
        msg: >-
          Completed {{ matrix_run.results | default([]) | rejectattr('failed') | list | length }}
          of {{ matrix_run.results | default([]) | length }} runs.
          Cleanup between runs: {{ matrix_cleanup_between_runs | bool }}.
          Results in {{ os_results_dir }}, archives in {{ archive_dir }}.

    - name: Show failed matrix runs (if any)
      ansible.builtin.debug:
        msg: >-
          Failed: vu={{ item.item[0] }} run={{ item.item[1] }} —
          {{ (item.stderr_lines | default([])) | last | default(item.msg | default('unknown')) }}
      loop: "{{ matrix_run.results | default([]) | selectattr('failed', 'defined') | selectattr('failed') | list }}"
      when: (matrix_run.results | default([]) | selectattr('failed', 'defined') | selectattr('failed') | list) | length > 0
