---
# Derived from postgresql_major and bench storage settings in inventory.ini.
pgsql_data_dir: >-
  {{
    (bench_data_mount ~ '/data')
    if (bench_storage_enable | default(true) | bool)
    else ('/var/lib/pgsql/' ~ (postgresql_major | string) ~ '/data')
  }}
postgresql_service_name: "postgresql-{{ postgresql_major }}"

# Normalize inventory.ini comma-separated or JSON list for PCP disk.dev metrics.
_pcp_disk_dev_list: >-
  {{
    (pcp_disk_dev_instances | string | split(',') | map('trim') | reject('equalto', '') | list)
    if (pcp_disk_dev_instances is string)
    else (pcp_disk_dev_instances | default([]) | list)
  }}
