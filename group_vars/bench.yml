---
# Bench RHEL: override at runtime with -e bench_rhel_release_id=9.4 or cpt-run.sh --rhel 9.4.
# Client RHEL stays on [client:vars] os_prep_rhel_release_id (not affected by bench_rhel_release_id).
os_prep_rhel_release_id: "{{ bench_rhel_release_id | default(bench_rhel_release_id_default) }}"

# Derived from postgresql_major and bench storage settings in inventory.ini.
pgsql_data_dir: >-
  {{
    (bench_data_mount ~ '/data')
    if (bench_storage_enable | default(true) | bool)
    else ('/var/lib/pgsql/' ~ (postgresql_major | string) ~ '/data')
  }}
postgresql_service_name: "postgresql-{{ postgresql_major }}"
